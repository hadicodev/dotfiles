general {
    lock_cmd = pidof hyprlock || hyprlock      # Locks the screen using hyprlock
    unlock_cmd = pkill -USR1 hyprlock          # Unlocks the screen
    before_sleep_cmd = loginctl lock-session   # Locks the session before sleep
    ignore_dbus_inhibit = false                # Respects DBus inhibit signals (e.g., from media players)
}

# Listener for locking the screen after 5 minutes
listener {
    timeout = 300                              # 5 minutes (300 seconds) of inactivity
    on-timeout = /home/dragon/.config/hypr/scripts/check_idle.sh lock  # Custom script to check for media before locking
    on-resume = hyprctl dispatch dpms on       # Turns the display back on after resume
}

# Listener for suspending the system after 10 minutes (to allow lock first)
listener {
    timeout = 900                              # 15 minutes (900 seconds) of inactivity
    on-timeout = /home/dragon/.config/hypr/scripts/check_idle.sh suspend  # Custom script to check for media before suspending
    on-resume = hyprctl dispatch dpms on       # Turns the display back on after resume
}
